{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Kyrgyzstan{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<nav class="nav">
  <div class="nav__inner">
    <a href="{% url 'home' %}" class="nav__logo">Kyrgyzstan <span>atlas</span></a>
    <button class="nav__burger" onclick="this.nextElementSibling.classList.toggle('open')">&#9776;</button>
    <ul class="nav__menu">
      <li><a href="{% url 'home' %}" class="nav__link">Главная</a></li>
      <li><a href="{% url 'bishkek_intro' %}" class="nav__link">Бишкек</a></li>
      <li><a href="{% url 'history' %}" class="nav__link">История</a></li>
      <li><a href="{% url 'food' %}" class="nav__link">Кухня</a></li>
      <li><a href="{% url 'nature' %}" class="nav__link">Природа</a></li>
      <li><a href="{% url 'places' %}" class="nav__link">Места</a></li>
      <li><a href="{% url 'guide' %}" class="nav__link">Гид</a></li>
    </ul>
  </div>
</nav>

{% block hero %}{% endblock %}

<div class="page">
  {% block content %}{% endblock %}
</div>

<footer class="footer">
  <p class="footer__text">&copy; 2026 Kyrgyzstan Atlas &middot; Travel Guide</p>
</footer>

</body>
</html>
