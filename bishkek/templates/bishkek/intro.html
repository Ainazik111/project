{% extends 'base.html' %}
{% block title %}Бишкек — Кыргызстан{% endblock %}
{% block content %}
<section class="page-header">
    <h1>Бишкек</h1>
    <p>Столица Кыргызстана</p>
</section>

{% if intro %}
    {% for item in intro %}
    <section class="info-section">
        <h2>{{ item.title }}</h2>
        <p>{{ item.description }}</p>
        {% if item.image %}
            <img src="{{ item.image.url }}" alt="{{ item.title }}">
        {% endif %}
    </section>
    {% endfor %}
{% endif %}
{% endblock %}
